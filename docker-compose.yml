services:
  nginx:
    image: nginx:alpine
    container_name: eventboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/boardy-laravel/public:/var/www/html/public:ro
      - laravel_storage:/var/www/html/storage:ro
    depends_on:
      - laravel
      - fastapi
    networks:
      - eventboard_net

  laravel:
    build:
      context: ./src/boardy-laravel
      dockerfile: Dockerfile
    container_name: eventboard-laravel
    working_dir: /var/www/html
    volumes:
      - laravel_storage:/var/www/html/storage
      - ./src/boardy-laravel/.env:/var/www/html/.env
    env_file:
      - ./src/boardy-laravel/.env
    command: >
      sh -c "
      mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache &&
      chown -R www-data:www-data storage bootstrap/cache &&
      chmod -R 775 storage bootstrap/cache &&
      if [ -f storage/oauth-private.key ]; then chmod 600 storage/oauth-private.key; fi &&
      if [ -f storage/oauth-public.key ]; then chmod 644 storage/oauth-public.key; fi &&
      php-fpm
      "
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventboard_net

  fastapi:
    build:
      context: ./src/boardy-api
      dockerfile: Dockerfile
    container_name: eventboard-api
    working_dir: /app
    volumes:
      - laravel_storage:/laravel-storage:ro
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: eventboard
      DB_PASSWORD: eventboard_password
      DB_NAME: eventboard_laravel
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      OAUTH_PUBLIC_KEY: /laravel-storage/oauth-public.key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eventboard_net

  mysql:
    image: mysql:8
    container_name: eventboard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: eventboard
      MYSQL_PASSWORD: eventboard_password
      MYSQL_DATABASE: eventboard_laravel
    volumes:
      - eventboard_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - eventboard_net

  redis:
    image: redis:7-alpine
    container_name: eventboard-redis
    volumes:
      - eventboard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - eventboard_net

volumes:
  eventboard_mysql_data:
  eventboard_redis_data:
  laravel_storage:

networks:
  eventboard_net:
    driver: bridge
